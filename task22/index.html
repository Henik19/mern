<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">

    <nav class="sticky top-0 bg-white">
        <div class="flex justify-between px-6 py-4">

            <h1 class="font-bold">+ Project</h1>

            <div class="flex gap-4 text-sm">
                <a href="#">Product</a>
                <a href="#">Solutions</a>
                <a href="#">Resources</a>
                <a href="#">Pricing</a>
                <a href="#">Log in</a>

                <button class="bg-black text-white px-3 py-1 rounded">
                    Get AI free
                </button>
            </div>

        </div>
    </nav>
    <section class="bg-orange-100 py-16">

        <div class="text-center px-4">

            <h1 class="text-3xl font-bold mb-2">
                Write, plan, share.
            </h1>

            <h2 class="text-3xl font-bold mb-4">
                With AI at your side.
            </h2>

            <p class="text-gray-500 mb-6">
                It is the connected workspace where better work happens.
            </p>

            <div class="flex justify-center gap-3">
                <button class="bg-black text-white px-4 py-2 rounded">
                    Get AI free
                </button>

                <button class="bg-blue-500 text-white px-4 py-2 rounded">
                    Request demo
                </button>
            </div>

        </div>

        <div class="relative mt-10 flex justify-center">

            <img src="technology-concept-with-futuristic-element.jpg" class="w-1/4 h-48 object-cover rounded shadow">

            <div class="absolute left-5 top-5 bg-white p-2 text-xs shadow rounded">
                Tasks <br>
                <span class="text-gray-500">12 done</span>
            </div>

            <div class="absolute right-5 top-5 bg-white p-2 text-xs shadow rounded">
                Status <br>
                <span class="text-green-500">On Track</span>
            </div>

            <div class="absolute right-10 bottom-0 bg-white p-2 text-xs shadow rounded">
                Team <br>
                <span class="text-gray-500">+5 online</span>
            </div>

        </div>

    </section>
    <div class="fixed bottom-4 right-4">
        <button class="bg-black text-white p-3 rounded-full">
            💬
        </button>
    </div>

</body>

</html>
