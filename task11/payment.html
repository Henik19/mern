<!DOCTYPE html>
<html>
<head>
<title>Product Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="nav">
    <div class="logo">Thala <span>7.</span></div>
    <div class="menu">
        <a href="index.html">Home</a>
        <a href="#">About</a>
        <a href="product.html">Brands</a>
        <a href="#">More</a>
        <a href="#">Contact</a>
    </div>
    <div class="right-icons">
        <input type="text" placeholder="Search">
        <a href="cart.html">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>
        <img src="image\pexels-pixabay-157661.jpg">
    </div>
</div>
</div>
<div class="checkout-container">
    <div class="checkout-left">
        <h2>Checkout</h2>
        <label>Email ID</label>
        <input type="email" placeholder="Enter your email">
    <div class="payment-options">
        <button>Card</button>
        <button>Crypto</button>
        <button>Bank</button>
    </div>
    <div class="payment-card">
        <label>Card Number</label>
        <input type="text" placeholder="1234 5678 9012 3456">
        <div class="row">
        <div class="col">
            <label>Expiry</label>
            <input type="text" placeholder="MM/YY">
        </div>
        <div class="col">
            <label>CVV</label>
        <input type="text" placeholder="123">
        </div>
        </div>
            <label>Country</label>
            <input type="text" placeholder="India">
            <label>Zip Code</label>
            <input type="text" placeholder="395007">
        </div>
        </div>
    <div class="checkout-right">
        <h3>Order Summary</h3>
        <div class="summary-card">
        <div class="coupon">
            <input type="text" placeholder="COUPON CODE">
            <button class="apply-btn">Apply Coupon</button>
        </div>
        <div class="bill">
        <p>Sub Total <span>₹4,700</span></p>
        <p>Taxes <span>₹199</span></p>
        <p>Discount <span>₹0</span></p>
        <hr>
        <h3>Total <span>₹4,999</span></h3>
        </div>
        </div>
        <button class="pay-btn">Pay Now ₹4,999</button>
        <div class="payment-icons">
            <img src="https://razorpay.com/assets/razorpay-logo.svg">
        </div>
        </div>
        </div>
</body>
</html>
