<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myorah Certificate</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:20px;
    background:#f4eef1;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Poppins', sans-serif;
    box-sizing:border-box;
}

/* Normal Landscape Certificate Size */
.certificate{
    width:950px;
    height:670px;
    background:linear-gradient(135deg,#fffafb,#fdeff3);
    padding:55px 70px;
    box-sizing:border-box;
    position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    flex-shrink:0;
}

@page {
    size: landscape;
    margin: 0;
}

/* Baby Pink Luxury Border */
.certificate:before{
    content:"";
    position:absolute;
    top:25px;
    left:25px;
    right:25px;
    bottom:25px;
    border:6px solid #e8b4c4;
}

/* Brand - MUORAH */
.brand{
    text-align:center;
    margin-bottom:4px;
    line-height:1;
}
.brand-main{
    display:block;
    font-family:'Cinzel', serif;
    font-size:32px;
    font-weight:600;
    letter-spacing:10px;
    color:#2b2b2b;
}
.brand-sub{
    display:block;
    font-family:'Great Vibes', cursive;
    font-size:22px;
    color:#c8922a;
    letter-spacing:2px;
    margin-top:2px;
}

/* Title */
.title{
    text-align:center;
    font-family:'Cinzel', serif;
    font-size:34px;
    font-weight:600;
    letter-spacing:6px;
    text-transform:uppercase;
    color:#2b2b2b;
    margin-bottom:50px;
}

/* Content Section */
.content{
    text-align:center;
    margin-top:20px;
}

.content p{
    font-family:'Poppins', sans-serif;
    font-weight:300;
    font-size:16px;
    color:#555;
    margin:18px 0;
}

.student-name{
    font-family:'Great Vibes', cursive;
    font-size:52px;
    color:#2b2b2b;
    margin:20px 0;
    padding-top:25px;
    padding-bottom:6px;
    border-bottom:2px solid #c8922a;
    display:inline-block;
    min-width:450px;
}

.course-name{
    font-family:'Playfair Display', serif;
    font-size:22px;
    font-weight:600;
    color:#2b2b2b;
    margin:20px 0;
}

.description{
    width:75%;
    margin:30px auto;
    line-height:1.9;
    font-size:14px;
    font-family:'Poppins', sans-serif;
    font-weight:300;
    color:#444;
}

/* Bottom Section */
.bottom-section{
    position:absolute;
    bottom:50px;
    left:80px;
    right:80px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
}

/* Date */
.date-section{
    text-align:center;
    font-family:'Poppins', sans-serif;
    font-size:11px;
    font-weight:500;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#2b2b2b;
    padding:10px;
    margin-bottom: 50px;
    padding-top: 2px;
}

.date-line{
    margin-top:8px;
    width:250px;
    border-bottom:1.5px solid #888;
}

/* Signature */
.signature-section{
    text-align:center;
}

.signature-line{
    width:250px;
    border-bottom:1.5px solid #888;
    margin-bottom:8px;
}

.signature-name{
    font-family:'Poppins', sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#333;
    margin-bottom: 50px;
}

@media print{
    body{
        background:white;
    }
    .certificate{
        box-shadow:none;
    }
}

</style>
</head>

<body>

<div class="certificate">

    <div class="brand">
        <span class="brand-main">MYORAH</span>
        <span class="brand-sub">by unnati</span>
    </div>

    <div class="title">CERTIFICATE OF COMPLETION</div>

    <div class="content">

        <p>This is to proudly certify that</p>

        <div class="student-name"></div>
        <p>Appericiation of participation in training class event</p>
        <div class="course-name">"Signature Self Makeup Master Class"</div>


    </div>

    <div class="bottom-section">

        <div class="date-section">
            <div class="date-line"></div>
            Date
        </div>

        <div class="signature-section">
            <div class="signature-line"></div>
            <div class="signature-name">Signature</div>
        </div>

    </div>

</div>

</body>
</html>
